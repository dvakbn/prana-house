<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery | Prana House</title>
  <meta name="description" content="Photos from Prana House yoga classes, workshops and wellness sessions in Jaipur."/>
  <link rel="stylesheet" href="/css/style.css?v=20260622d"/>
  <style>
    .gallery-filters {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem;
    }
    .gfilter {
      padding: 0.45rem 1.1rem; border-radius: 50px; font-size: 0.82rem; font-weight: 500;
      background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary);
      cursor: pointer; transition: var(--transition);
    }
    .gfilter.active, .gfilter:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .gallery-grid {
      columns: 3;
      column-gap: 1.25rem;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1.25rem;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }
    .gallery-item:hover { transform: scale(1.02); box-shadow: var(--shadow-hover); }
    .gallery-item img {
      width: 100%; height: auto; display: block;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-placeholder {
      aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0.5rem;
      font-size: 2.5rem;
      background: var(--surface);
    }
    .gallery-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 1rem;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-caption { color: #fff; font-size: 0.82rem; font-weight: 500; }
    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: var(--radius); }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      color: #fff; font-size: 2rem; cursor: pointer; line-height: 1;
      background: none; border: none;
    }
    .empty-gallery {
      text-align: center; padding: 5rem 2rem; color: var(--text-light);
      grid-column: 1/-1;
    }
    #loading-state { text-align: center; padding: 3rem; color: var(--text-light); }
    @media (max-width: 768px) { .gallery-grid { columns: 2; } }
    @media (max-width: 480px) { .gallery-grid { columns: 1; } }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-hero">
    <div class="container">
      <span class="section-label">Visual Journey</span>
      <h1>Our <span class="display-italic">Gallery</span></h1>
      <p>Moments of stillness, movement and connection from Prana House.</p>
    </div>
  </div>

  <section class="section-pad" style="background:var(--bg);" id="section-gallery">
    <div class="container">
      <div class="gallery-filters fade-in" id="gallery-filters">
        <button class="gfilter active" data-cat="all">All</button>
        <button class="gfilter" data-cat="classes">Classes</button>
        <button class="gfilter" data-cat="meditation">Meditation</button>
        <button class="gfilter" data-cat="workshop">Workshops</button>
        <button class="gfilter" data-cat="retreat">Retreat</button>
      </div>
      <div id="loading-state">Loading gallery... 🌿</div>
      <div class="gallery-grid" id="gallery-grid" style="display:none;"></div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt=""/>
  </div>

  <div id="footer-placeholder"></div>
  <script src="/js/components.js?v=20260622d"></script>
  <script src="/js/main.js?v=20260622d"></script>
  <script>
    let allItems = [];

    // Emoji placeholders per category (shown when no real images)
    const placeholders = [
      { emoji: '🧘', caption: 'Morning Asana Practice', category: 'classes' },
      { emoji: '🌬️', caption: 'Pranayama Session', category: 'meditation' },
      { emoji: '🤸', caption: 'Flexibility Training', category: 'classes' },
      { emoji: '🌿', caption: 'Wellness Workshop', category: 'workshop' },
      { emoji: '🌸', caption: 'Stress Relief Class', category: 'classes' },
      { emoji: '☀️', caption: 'Sunrise Meditation', category: 'meditation' },
      { emoji: '🏡', caption: 'Prana House Studio', category: 'classes' },
      { emoji: '🌄', caption: 'Retreat Day', category: 'retreat' },
      { emoji: '💚', caption: 'Community Session', category: 'workshop' },
    ];

    async function loadGallery(filter = 'all') {
      const grid = document.getElementById('gallery-grid');
      const loader = document.getElementById('loading-state');
      try {
        const res = await fetch('/api/gallery');
        const data = await res.json();
        allItems = data.length ? data : placeholders;
        loader.style.display = 'none';
        grid.style.display = 'block';
        renderGallery(filter);
      } catch {
        allItems = placeholders;
        loader.style.display = 'none';
        grid.style.display = 'block';
        renderGallery(filter);
      }
    }

    function renderGallery(filter) {
      const grid = document.getElementById('gallery-grid');
      const items = filter === 'all' ? allItems : allItems.filter(i => i.category === filter);
      if (!items.length) {
        grid.innerHTML = `<div class="empty-gallery"><div style="font-size:3rem;margin-bottom:1rem;">🌿</div><p>No photos in this category yet.</p></div>`;
        return;
      }
      grid.innerHTML = items.map((item, i) => `
        <div class="gallery-item fade-in" data-index="${i}" ${item.url ? `data-url="${item.url}"` : ''}>
          ${item.url
            ? `<img src="${item.url}" alt="${item.caption || ''}" loading="lazy"/>`
            : `<div class="gallery-placeholder"><span>${item.emoji}</span><span style="font-size:0.78rem;color:var(--text-light);">${item.caption || ''}</span></div>`
          }
          <div class="gallery-overlay"><span class="gallery-caption">${item.caption || ''}</span></div>
        </div>
      `).join('');
      // Fade in
      setTimeout(() => {
        grid.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
      }, 50);
      // Lightbox click (only for real images)
      grid.querySelectorAll('.gallery-item[data-url]').forEach(el => {
        el.addEventListener('click', () => {
          const lb = document.getElementById('lightbox');
          document.getElementById('lightbox-img').src = el.dataset.url;
          lb.classList.add('open');
        });
      });
    }

    // Filter buttons
    document.querySelectorAll('.gfilter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.gfilter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(btn.dataset.cat);
      });
    });

    // Close lightbox
    document.getElementById('lightbox-close').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('open');
    });
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
    });

    loadGallery();
  </script>
</body>
</html>
