<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wellness Blog | Prana House</title>
  <meta name="description" content="Articles on yoga, naturopathy, breathwork, stress relief and holistic wellness by Dr. Fareen Tak."/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
    .blog-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: var(--transition); display: flex; flex-direction: column; cursor: pointer; text-decoration: none; color: inherit; }
    .blog-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .blog-thumb { height: 200px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; }
    .blog-thumb img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
    .blog-thumb-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.07)); }
    .blog-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .blog-category { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: rgba(92,138,92,0.1); padding: 0.25rem 0.75rem; border-radius: 50px; display: inline-block; margin-bottom: 0.75rem; }
    .blog-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; line-height: 1.4; }
    .blog-card p { font-size: 0.88rem; flex: 1; margin-bottom: 1.25rem; }
    .blog-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--text-light); }
    .blog-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
    .filter-btn { padding: 0.45rem 1.1rem; border-radius: 50px; font-size: 0.82rem; font-weight: 500; background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: var(--transition); }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    #loading-state { text-align: center; padding: 3rem; color: var(--text-light); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-light); grid-column: 1/-1; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="page-hero">
    <div class="container">
      <span class="section-label">Knowledge & Wisdom</span>
      <h1>Wellness <span class="display-italic">Blog</span></h1>
      <p>Articles, guides and reflections on yoga, naturopathy, breath and holistic living by Dr. Fareen Tak.</p>
    </div>
  </div>
  <section class="section-pad" style="background:var(--bg);">
    <div class="container">
      <div class="blog-filters fade-in" id="filter-bar">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="Yoga">Yoga</button>
        <button class="filter-btn" data-cat="Pranayama">Pranayama</button>
        <button class="filter-btn" data-cat="Naturopathy">Naturopathy</button>
        <button class="filter-btn" data-cat="Meditation">Meditation</button>
        <button class="filter-btn" data-cat="Lifestyle">Lifestyle</button>
        <button class="filter-btn" data-cat="Stress & Mental Health">Stress & Mental Health</button>
      </div>
      <div id="loading-state">Loading articles... 🌿</div>
      <div class="blog-grid" id="blog-grid" style="display:none;"></div>
      <div style="margin-top:4rem;text-align:center;padding:3rem;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);" class="fade-in">
        <h3 style="font-size:1.6rem;margin-bottom:0.5rem;">Get Articles in Your Inbox</h3>
        <p style="margin-bottom:2rem;">New posts on yoga, breath and holistic health — delivered weekly.</p>
        <form class="newsletter-form" style="display:flex;gap:0.75rem;max-width:400px;margin:0 auto;">
          <input type="email" name="email" class="form-input" placeholder="Your email address" required/>
          <button type="submit" class="btn btn-primary" style="white-space:nowrap;">Subscribe</button>
        </form>
      </div>
    </div>
  </section>
  <div id="footer-placeholder"></div>
  <script src="/js/components.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let allPosts = [];

    async function loadBlog() {
      const grid = document.getElementById('blog-grid');
      const loader = document.getElementById('loading-state');
      try {
        const res = await fetch('/api/blog');
        allPosts = await res.json();
        loader.style.display = 'none';
        grid.style.display = 'grid';
        renderPosts('all');
      } catch {
        loader.textContent = 'Could not load articles.';
      }
    }

    function renderPosts(cat) {
      const grid = document.getElementById('blog-grid');
      const posts = cat === 'all' ? allPosts : allPosts.filter(p => p.category === cat);
      if (!posts.length) {
        grid.innerHTML = `<div class="empty-state"><div style="font-size:3rem;margin-bottom:1rem;">🌿</div><p>No articles yet in this category.</p></div>`;
        return;
      }
      grid.innerHTML = posts.map(p => `
        <a class="blog-card fade-in" href="/blog/${p.slug}">
          <div class="blog-thumb">
            ${p.cover_image ? `<img src="${p.cover_image}" alt="${p.title}"/>` : `<span>${p.emoji || '🌿'}</span>`}
            <div class="blog-thumb-overlay"></div>
          </div>
          <div class="blog-body">
            <span class="blog-category">${p.category || 'Wellness'}</span>
            <h3>${p.title}</h3>
            <p>${p.excerpt || ''}</p>
            <div class="blog-footer">
              <span>${p.author || 'Dr. Fareen Tak'}</span>
              <span>${p.read_time ? p.read_time + ' min read' : ''}</span>
            </div>
          </div>
        </a>
      `).join('');
      setTimeout(() => grid.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible')), 50);
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPosts(btn.dataset.cat);
      });
    });

    loadBlog();
  </script>
</body>
</html>
