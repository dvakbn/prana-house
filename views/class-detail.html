<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Class Details | Prana House</title>
  <meta name="description" id="page-description" content=""/>
  <link rel="stylesheet" href="/css/style.css?v=20260621d"/>
  <style>
    .class-detail-hero {
      min-height: 60vh;
      background: linear-gradient(135deg, #C2738A 0%, #3a6041 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 9rem 2rem 5rem;
      overflow: hidden;
    }
    .class-detail-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200,169,110,0.1) 0%, transparent 50%);
    }
    .class-hero-content {
      position: relative;
      z-index: 2;
      max-width: 750px;
      text-align: center;
      color: #fff;
    }
    .class-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 1.75rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 2rem;
    }
    .class-hero-content h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 3.8rem);
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
      color: #fff;
    }
    .class-hero-content .display-italic { color: var(--accent-warm); }
    .class-hero-desc {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.8;
      max-width: 620px;
      margin: 0 auto 3rem;
    }
    .class-meta {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }
    .class-meta-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.18);
    }
    .class-meta-item span:first-child {
      font-size: 1.15rem;
    }
    
    .info-section {
      padding: 5rem 0;
      background: var(--bg);
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2.5rem;
      margin-top: 3.5rem;
    }
    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      text-align: center;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .info-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-warm) 100%);
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }
    .info-card:hover::before {
      transform: scaleX(1);
    }
    .info-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.1);
      border-color: rgba(194,115,138,0.3);
    }
    .info-icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    .info-card h3 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      font-family: var(--font-display);
    }
    .info-card p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    
    .booking-section {
      background: linear-gradient(135deg, #C2738A 0%, #3a6041 100%);
      padding: 5rem 0;
      position: relative;
      overflow: hidden;
    }
    .booking-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 40%, rgba(255,255,255,0.08) 0%, transparent 60%);
    }
    .booking-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 4rem 3rem;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.15);
    }
    .booking-card h2 {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      font-family: var(--font-display);
    }
    .booking-card .divider-leaf {
      margin: 1.5rem auto;
    }
    .price-tag {
      font-size: 3rem;
      font-weight: 600;
      color: var(--accent);
      margin: 2rem 0;
      font-family: var(--font-display);
    }
    .price-tag small {
      font-size: 1.1rem;
      color: var(--text-light);
      font-weight: 400;
    }
    
    @media (max-width: 768px) {
      .class-detail-hero {
        padding: 7rem 1.5rem 3.5rem;
      }
      .class-meta {
        gap: 1rem;
      }
      .class-meta-item {
        padding: 0.65rem 1.2rem;
        font-size: 0.88rem;
      }
      .info-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .booking-card {
        padding: 3rem 2rem;
      }
      .price-tag {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- Class Hero -->
  <section class="class-detail-hero">
    <div class="class-hero-content">
      <div class="class-type-badge" id="class-type"></div>
      <h1 id="class-name">Loading...</h1>
      <p class="class-hero-desc" id="class-description"></p>
      <div class="class-meta" id="class-meta"></div>
    </div>
  </section>

  <!-- Details Section -->
  <section class="info-section">
    <div class="container">
      <div class="section-header centered fade-in">
        <span class="section-label">Class Details</span>
        <h2>What to <span class="display-italic">Expect</span></h2>
        <div class="divider-leaf centered"></div>
      </div>
      <div class="info-grid" id="info-grid"></div>
    </div>
  </section>

  <!-- Booking Section -->
  <section class="booking-section">
    <div class="container-sm">
      <div class="booking-card fade-in">
        <h2>Ready to <span class="display-italic">Begin?</span></h2>
        <div class="divider-leaf centered"></div>
        <p style="font-size:1.05rem;color:var(--text-secondary);margin-bottom:0.5rem;">Join this class and start your yoga journey</p>
        <div id="price-display" class="price-tag"></div>
        <a href="#" id="whatsapp-button" class="btn btn-primary btn-lg" style="font-size:1.05rem;padding:1rem 3rem;">
          Join via WhatsApp →
        </a>
        <p style="font-size:0.85rem;color:var(--text-light);margin-top:2rem;">Have questions? We're here to help</p>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="/js/components.js?v=20260621d"></script>
  <script src="/js/main.js?v=20260621d"></script>
  <script>
    // Get class ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const classId = urlParams.get('id');

    if (!classId) {
      window.location.href = '/classes';
    }

    async function loadClassDetails() {
      try {
        const res = await fetch('/api/classes');
        const classes = await res.json();
        const classData = classes.find(c => c.id === classId);

        if (!classData) {
          window.location.href = '/classes';
          return;
        }

        // Update page title and meta
        document.getElementById('page-title').textContent = `${classData.name} | Prana House`;
        document.getElementById('page-description').content = classData.description || '';

        // Hero section
        const typeIcon = classData.type === 'Online' ? '💻' : classData.type === 'Offline' ? '🏡' : '🔄';
        document.getElementById('class-type').innerHTML = `<span>${typeIcon}</span><span>${classData.type || 'Class'}</span>`;
        document.getElementById('class-name').textContent = classData.name;
        document.getElementById('class-description').textContent = classData.description || '';

        // Meta info
        const levelDisplay = classData.level === 'all' ? 'All Levels' : classData.level.charAt(0).toUpperCase() + classData.level.slice(1);
        const metaHTML = `
          <div class="class-meta-item">
            <span>📅</span>
            <span>${classData.schedule}</span>
          </div>
          ${classData.duration ? `
            <div class="class-meta-item">
              <span>⏱</span>
              <span>${classData.duration} min</span>
            </div>
          ` : ''}
          <div class="class-meta-item">
            <span>📊</span>
            <span>${levelDisplay}</span>
          </div>
          ${classData.max_students ? `
            <div class="class-meta-item">
              <span>👥</span>
              <span>Max ${classData.max_students}</span>
            </div>
          ` : ''}
        `;
        document.getElementById('class-meta').innerHTML = metaHTML;

        // Info cards
        const infoCards = [
          {
            icon: '🎯',
            title: 'Perfect For',
            text: levelDisplay === 'All Levels' 
              ? 'Everyone, from complete beginners to experienced practitioners. Dr. Fareen provides personalized attention to each student.' 
              : levelDisplay === 'Beginner' 
              ? 'Those new to yoga or returning to practice after a break. Gentle, accessible instruction with focus on foundations.' 
              : 'Practitioners with some yoga experience ready to deepen their practice and explore advanced techniques.'
          },
          {
            icon: '📍',
            title: 'Location',
            text: classData.type === 'Online' 
              ? 'Join from anywhere with live interactive sessions via video call. Full access to recordings for practice.' 
              : 'Prana House, Pratap Nagar, Jaipur. A peaceful, dedicated yoga space with all equipment provided.'
          },
          {
            icon: '🌿',
            title: 'What to Bring',
            text: classData.type === 'Online' 
              ? 'Yoga mat, comfortable clothing, stable internet connection, and a quiet space for practice.' 
              : 'Just yourself and comfortable clothing. Yoga mats, blocks, straps and all props are provided at the studio.'
          }
        ];

        document.getElementById('info-grid').innerHTML = infoCards.map(card => `
          <div class="info-card fade-in">
            <span class="info-icon">${card.icon}</span>
            <h3>${card.title}</h3>
            <p>${card.text}</p>
          </div>
        `).join('');

        // Price
        if (classData.price) {
          document.getElementById('price-display').innerHTML = `₹${classData.price.toLocaleString('en-IN')} <small>/month</small>`;
        } else {
          document.getElementById('price-display').style.display = 'none';
        }

        // WhatsApp button
        document.getElementById('whatsapp-button').href = `https://wa.me/919599839737?text=I want to join ${encodeURIComponent(classData.name)}`;

        // Trigger animations
        setTimeout(() => {
          document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
        }, 100);

      } catch (err) {
        console.error('Failed to load class details:', err);
        window.location.href = '/classes';
      }
    }

    loadClassDetails();
  </script>
</body>
</html>
