<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yoga Retreat — Coming Soon | Prana House</title>
  <meta name="description" content="Full Day Yoga Retreat by Prana House — an immersive day of meditation, pranayama, asana and deep rest. Coming soon to Jaipur."/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .retreat-hero-full {
      min-height: 100vh;
      background: linear-gradient(160deg, #1a2e1a 0%, #2d4a2d 60%, #1e3320 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 8rem 2rem 5rem;
    }
    .retreat-hero-full::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 40%, rgba(200,169,110,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(92,138,92,0.15) 0%, transparent 60%);
    }
    /* Animated orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: drift 12s ease-in-out infinite;
    }
    .orb-1 { width:300px;height:300px; background:rgba(92,138,92,0.12); top:-50px; right:10%; animation-delay:0s; }
    .orb-2 { width:200px;height:200px; background:rgba(200,169,110,0.1); bottom:10%; left:5%; animation-delay:-4s; }
    .orb-3 { width:150px;height:150px; background:rgba(201,169,154,0.1); top:40%; left:15%; animation-delay:-8s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0); }
      33% { transform: translate(30px,-20px); }
      66% { transform: translate(-20px,15px); }
    }
    .retreat-hero-content { position:relative; z-index:2; max-width: 700px; }
    .retreat-big-title {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 300;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 1rem;
    }
    .retreat-big-title em { font-style: italic; color: var(--accent-warm); }
    .retreat-subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.65);
      max-width: 500px;
      margin: 0 auto 2.5rem;
      line-height: 1.9;
    }
    .cs-badge {
      display: inline-flex; align-items: center; gap: 0.75rem;
      border: 1px solid rgba(200,169,110,0.45);
      color: var(--accent-warm);
      padding: 0.65rem 1.75rem;
      border-radius: 50px;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .cs-badge span { width:8px;height:8px;border-radius:50%;background:var(--accent-warm);animation:pulse-dot 2s infinite; }

    /* Schedule preview */
    .schedule-section { background: var(--bg-alt); }
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-top: 2.5rem;
    }
    .schedule-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      text-align: center;
      transition: var(--transition);
      opacity: 0.75;
    }
    .schedule-item:hover { opacity: 1; transform: translateY(-3px); box-shadow: var(--shadow); }
    .schedule-time {
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: var(--accent-warm);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .schedule-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .schedule-item h4 { font-size: 1rem; margin-bottom: 0.4rem; }
    .schedule-item p { font-size: 0.82rem; }

    /* Notify form */
    .notify-section {
      background: var(--bg);
      padding: 6rem 0;
      text-align: center;
    }
    .notify-form {
      display: flex; gap: 0.75rem; max-width: 420px; margin: 2rem auto 0;
    }
    @media (max-width: 480px) {
      .notify-form { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- Retreat Hero -->
  <section id="section-retreat-hero" class="retreat-hero-full">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="retreat-hero-content">
      <span class="retreat-eyebrow" style="display:block;font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent-warm);margin-bottom:1.5rem;">✦ Prana House Presents ✦</span>
      <h1 class="retreat-big-title">Full Day<br/><em>Yoga Retreat</em></h1>
      <p class="retreat-subtitle">
        An immersive journey of breath, movement, stillness and nourishment — from sunrise to sunset. A day dedicated entirely to you.
      </p>
      <div class="cs-badge"><span></span>Coming Soon<span></span></div>
      <br/>
      <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;">Be the first to know when dates are announced ↓</p>
    </div>
  </section>

  <!-- Dynamic Upcoming Retreats Section -->
  <section class="section-pad" style="background:var(--bg-alt);" id="dynamic-retreats-section">
    <div class="container">
      <div class="section-header centered fade-in">
        <span class="section-label">Coming Up</span>
        <h2>Upcoming <span class="display-italic">Retreats</span></h2>
        <div class="divider-leaf centered"></div>
      </div>
      <div id="retreats-loading" style="text-align:center;padding:2rem;color:var(--text-light);">Loading retreats... 🌿</div>
      <div id="retreats-grid" style="display:none;"></div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="/js/components.js"></script>
  <script src="/js/main.js"></script>
  <script>
    // Load dynamic retreats
    async function loadDynamicRetreats() {
      const loader = document.getElementById('retreats-loading');
      const grid = document.getElementById('retreats-grid');
      try {
        const res = await fetch('/api/retreats');
        const retreats = await res.json();
        
        if (retreats.length === 0) {
          loader.style.display = 'none';
          document.getElementById('dynamic-retreats-section').style.display = 'none';
          return;
        }
        
        loader.style.display = 'none';
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = 'repeat(auto-fit, minmax(340px, 1fr))';
        grid.style.gap = '2rem';
        
        grid.innerHTML = retreats.map(retreat => `
          <a href="/retreat/detail?id=${retreat.id}" class="fade-in" style="text-decoration:none;color:inherit;display:block;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition);cursor:pointer;">
            ${retreat.image ? `<img src="${retreat.image}" alt="${retreat.title}" style="width:100%;height:200px;object-fit:cover;">` : ''}
            <div style="padding:2rem;">
              <h3 style="font-size:1.4rem;margin-bottom:0.5rem;font-family:var(--font-display);">${retreat.title}</h3>
              <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;font-size:0.88rem;color:var(--text-light);">
                <span>📍 ${retreat.location}</span>
              </div>
              <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;font-size:0.88rem;color:var(--text-light);">
                <span>📅 ${new Date(retreat.start_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })} - ${new Date(retreat.end_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
              </div>
              ${retreat.description ? `<p style="font-size:0.9rem;margin-bottom:1.5rem;line-height:1.7;">${retreat.description.substring(0, 120)}${retreat.description.length > 120 ? '...' : ''}</p>` : ''}
              ${retreat.highlights && retreat.highlights.length > 0 ? `
                <div style="margin-bottom:1.5rem;">
                  <p style="font-weight:600;font-size:0.85rem;margin-bottom:0.75rem;color:var(--accent);">Highlights:</p>
                  <ul style="font-size:0.85rem;padding-left:1.25rem;color:var(--text-secondary);">
                    ${retreat.highlights.slice(0, 3).map(h => `<li style="margin-bottom:0.25rem;">${h}</li>`).join('')}
                  </ul>
                </div>
              ` : ''}
              ${retreat.schedule && retreat.schedule.length > 0 ? `
                <div style="margin-bottom:1.5rem;">
                  <p style="font-weight:600;font-size:0.85rem;margin-bottom:0.75rem;color:var(--accent);">Daily Schedule Preview:</p>
                  <div style="display:grid;gap:0.75rem;">
                    ${retreat.schedule.slice(0, 3).map(item => `
                      <div style="display:flex;gap:0.75rem;align-items:start;font-size:0.82rem;padding:0.75rem;background:var(--bg-alt);border-radius:var(--radius-sm);">
                        <span style="font-size:1.1rem;">${item.icon || '🌿'}</span>
                        <div style="flex:1;">
                          <div style="font-weight:600;color:var(--accent-warm);margin-bottom:0.2rem;font-size:0.75rem;letter-spacing:0.05em;">${item.time}</div>
                          <div style="font-weight:600;margin-bottom:0.15rem;">${item.title}</div>
                        </div>
                      </div>
                    `).join('')}
                    ${retreat.schedule.length > 3 ? `<div style="text-align:center;font-size:0.8rem;color:var(--text-light);">+ ${retreat.schedule.length - 3} more activities</div>` : ''}
                  </div>
                </div>
              ` : ''}
              <div style="display:flex;align-items:center;justify-content:space-between;padding-top:1.5rem;border-top:1px solid var(--border);">
                ${retreat.price ? `<p style="font-size:1.3rem;font-weight:600;color:var(--accent);">₹${retreat.price.toLocaleString('en-IN')}</p>` : '<div></div>'}
                <span class="btn btn-primary" style="pointer-events:none;">View Details →</span>
              </div>
            </div>
          </a>
        `).join('');
        
        setTimeout(() => grid.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible')), 50);
      } catch (err) {
        console.error('Failed to load retreats:', err);
        loader.style.display = 'none';
        document.getElementById('dynamic-retreats-section').style.display = 'none';
      }
    }
    
    loadDynamicRetreats();
  </script>
</body>
</html>
