<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yoga Retreat — Coming Soon | Prana House</title>
  <meta name="description" content="Full Day Yoga Retreat by Prana House — an immersive day of meditation, pranayama, asana and deep rest. Coming soon to Jaipur."/>
  <link rel="stylesheet" href="/css/style.css?v=20260622d"/>
  <style>
    .retreat-hero-full {
      min-height: 100vh;
      background: linear-gradient(160deg, #4A2233 0%, #7A3A4E 60%, #3A1B29 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 8rem 2rem 5rem;
    }
    .retreat-hero-full::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 40%, rgba(200,169,110,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(212,39,90,0.15) 0%, transparent 60%);
    }
    /* Animated orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: drift 12s ease-in-out infinite;
    }
    .orb-1 { width:300px;height:300px; background:rgba(212,39,90,0.12); top:-50px; right:10%; animation-delay:0s; }
    .orb-2 { width:200px;height:200px; background:rgba(200,169,110,0.1); bottom:10%; left:5%; animation-delay:-4s; }
    .orb-3 { width:150px;height:150px; background:rgba(201,169,154,0.1); top:40%; left:15%; animation-delay:-8s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0); }
      33% { transform: translate(30px,-20px); }
      66% { transform: translate(-20px,15px); }
    }
    .retreat-hero-content { position:relative; z-index:2; max-width: 700px; }
    .retreat-big-title {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 300;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 1rem;
    }
    .retreat-big-title em { font-style: italic; color: var(--accent-warm); }
    .retreat-subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.65);
      max-width: 500px;
      margin: 0 auto 2.5rem;
      line-height: 1.9;
    }
    .cs-badge {
      display: inline-flex; align-items: center; gap: 0.75rem;
      border: 1px solid rgba(200,169,110,0.45);
      color: var(--accent-warm);
      padding: 0.65rem 1.75rem;
      border-radius: 50px;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .cs-badge span { width:8px;height:8px;border-radius:50%;background:var(--accent-warm);animation:pulse-dot 2s infinite; }

    /* Schedule preview */
    .schedule-section { background: var(--bg-alt); }
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-top: 2.5rem;
    }
    .schedule-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      text-align: center;
      transition: var(--transition);
      opacity: 0.75;
    }
    .schedule-item:hover { opacity: 1; transform: translateY(-3px); box-shadow: var(--shadow); }
    .schedule-time {
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: var(--accent-warm);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .schedule-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .schedule-item h4 { font-size: 1rem; margin-bottom: 0.4rem; }
    .schedule-item p { font-size: 0.82rem; }

    /* Notify form */
    .notify-section {
      background: var(--bg);
      padding: 6rem 0;
      text-align: center;
    }
    .notify-form {
      display: flex; gap: 0.75rem; max-width: 420px; margin: 2rem auto 0;
    }
    @media (max-width: 480px) {
      .notify-form { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- Retreat Hero -->
  <section id="section-retreat-hero" class="retreat-hero-full">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="retreat-hero-content">
      <span class="retreat-eyebrow" style="display:block;font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent-warm);margin-bottom:1.5rem;">✦ Prana House Presents ✦</span>
      <h1 class="retreat-big-title">Full Day<br/><em>Yoga Retreat</em></h1>
      <p class="retreat-subtitle">
        An immersive journey of breath, movement, stillness and nourishment — from sunrise to sunset. A day dedicated entirely to you.
      </p>
    </div>
  </section>

  <!-- Dynamic Upcoming Retreats Section -->
  <section class="section-pad" style="background:var(--bg-alt);" id="dynamic-retreats-section">
    <div class="container">
      <div class="section-header centered fade-in">
        <div class="eyebrow-label" style="text-align:center;">Coming Up</div>
        <h2 class="heading-editorial">Upcoming <em>retreats.</em></h2>
        <div class="divider-leaf centered"></div>
      </div>
      <div id="retreats-loading" style="text-align:center;padding:2rem;color:var(--text-light);">Loading retreats... 🌿</div>
    </div>
    <div id="retreats-grid" style="display:none;"></div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="/js/components.js?v=20260622d"></script>
  <script src="/js/main.js?v=20260622d"></script>
  <script>
    // Load dynamic retreats
    async function loadDynamicRetreats() {
      const loader = document.getElementById('retreats-loading');
      const grid = document.getElementById('retreats-grid');
      try {
        const res = await fetch('/api/retreats');
        const retreats = await res.json();
        
        if (retreats.length === 0) {
          loader.style.display = 'none';
          document.getElementById('dynamic-retreats-section').style.display = 'none';
          return;
        }
        
        loader.style.display = 'none';
        grid.style.display = 'block';

        const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const fmt = (d) => new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

        grid.innerHTML = retreats.map((retreat, i) => {
          const hasImage = retreat.image && String(retreat.image).trim();
          const dates = retreat.start_date ? `${new Date(retreat.start_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})} – ${fmt(retreat.end_date)}` : '';
          const metaBits = [retreat.location ? '📍 ' + retreat.location : '', dates ? '📅 ' + dates : ''].filter(Boolean);
          const nameParts = String(retreat.title || '').trim().split(' ');
          const lastWord = nameParts.length > 1 ? nameParts.pop() : '';
          const titleHtml = lastWord ? `${esc(nameParts.join(' '))} <em>${esc(lastWord)}.</em>` : `<em>${esc(retreat.title)}</em>`;
          const highlights = (retreat.highlights && retreat.highlights.length)
            ? `<ul style="font-size:0.92rem;color:var(--text-secondary);line-height:1.9;margin:0 0 1.75rem;padding-left:1.1rem;">${retreat.highlights.slice(0,4).map(h => `<li>${esc(h)}</li>`).join('')}</ul>` : '';
          return `
            <div class="sticky-class-section ${i % 2 === 1 ? 'flip' : ''}">
              <div class="sticky-class-inner">
                <div class="sticky-class-image-col">
                  <div class="sticky-class-image-wrap">
                    ${hasImage ? `<img src="${esc(retreat.image)}" alt="${esc(retreat.title)}" class="sticky-class-image" onerror="this.outerHTML='🏔️'"/>` : '🏔️'}
                  </div>
                </div>
                <div class="sticky-class-content-col">
                  <div class="class-content-meta">
                    ${metaBits.map((b, j) => `${j ? '<span class="class-dot">•</span>' : ''}<span>${esc(b)}</span>`).join('')}
                  </div>
                  <h2 class="heading-editorial class-title-sticky appear-on-scroll">${titleHtml}</h2>
                  ${retreat.description ? `<p class="class-description-sticky appear-on-scroll" style="--delay:0.1s;">${esc(retreat.description)}</p>` : ''}
                  ${highlights}
                  ${retreat.price ? `<p style="font-size:1.3rem;font-weight:600;color:var(--accent);margin-bottom:1.5rem;">₹${retreat.price.toLocaleString('en-IN')}</p>` : ''}
                  <a href="/retreat/detail?id=${retreat.id}" class="btn btn-primary appear-on-scroll" style="--delay:0.2s;">View Details →</a>
                </div>
              </div>
            </div>
          `;
        }).join('');

        if (typeof observeAppear === 'function') observeAppear(document);
      } catch (err) {
        console.error('Failed to load retreats:', err);
        loader.style.display = 'none';
        document.getElementById('dynamic-retreats-section').style.display = 'none';
      }
    }
    
    loadDynamicRetreats();
  </script>
</body>
</html>
