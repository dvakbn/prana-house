<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Prana House</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="/css/style.css?v=20260621d"/>
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-alt) 0%, var(--bg) 100%);
      padding: 2rem;
    }
    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-hover);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo svg {
      width: 60px;
      height: 60px;
      margin: 0 auto 1rem;
    }
    .login-logo h2 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .login-logo p {
      font-size: 0.88rem;
      color: var(--text-light);
    }
    .login-form {
      margin-top: 2rem;
    }
    .form-message {
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .form-message.error {
      background: rgba(201,90,90,0.1);
      color: #b94040;
      border: 1px solid rgba(201,90,90,0.3);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="20" cy="20" rx="3.2" ry="8" fill="rgba(194,115,138,0.18)" stroke="var(--accent)" stroke-width="1" transform="rotate(0 20 20)"/>
          <ellipse cx="20" cy="20" rx="3.2" ry="8" fill="rgba(194,115,138,0.18)" stroke="var(--accent)" stroke-width="1" transform="rotate(45 20 20)"/>
          <ellipse cx="20" cy="20" rx="3.2" ry="8" fill="rgba(194,115,138,0.18)" stroke="var(--accent)" stroke-width="1" transform="rotate(90 20 20)"/>
          <ellipse cx="20" cy="20" rx="3.2" ry="8" fill="rgba(194,115,138,0.18)" stroke="var(--accent)" stroke-width="1" transform="rotate(135 20 20)"/>
          <circle cx="20" cy="20" r="3.5" fill="var(--accent-warm)" opacity="0.9"/>
        </svg>
        <h2>Admin Login</h2>
        <p>Prana House Management</p>
      </div>

      <form class="login-form" id="admin-login-form">
        <div id="login-message" class="form-message"></div>
        
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input 
            class="form-input" 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter username" 
            required 
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            class="form-input" 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter password" 
            required 
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:1.5rem;">
          Login to Dashboard
        </button>
      </form>

      <div style="text-align:center;margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border);">
        <a href="/" style="font-size:0.85rem;color:var(--text-light);">← Back to Website</a>
      </div>
    </div>
  </div>

  <script>
    // Simple admin authentication
    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const msg = document.getElementById('login-message');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin/dashboard';
        } else {
          msg.className = 'form-message error';
          msg.textContent = data.error || 'Invalid credentials';
          msg.style.display = 'block';
        }
      } catch (err) {
        msg.className = 'form-message error';
        msg.textContent = 'Login failed. Please try again.';
        msg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Login to Dashboard';
    });
  </script>
</body>
</html>
